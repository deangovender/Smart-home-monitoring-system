- id: study_light_ml_enforce
  alias: Study light ↔ Enforce ML occupancy
  mode: single
  trigger:
    # React to normal edges
    - platform: state
      entity_id: binary_sensor.study_occupancy_ml
    # Reconcile on HA start
    - platform: homeassistant
      event: start
    # Belt-and-braces: reconcile every minute
    - platform: time_pattern
      minutes: "/1"
  condition:
    # Respect your “switch supersedes” rule
    - condition: state
      entity_id: input_boolean.study_override_internal
      state: 'off'
  action:
    # If we triggered at HA start, wait until the sensor has a real state
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.platform == 'homeassistant' }}"
          sequence:
            - wait_template: "{{ states('binary_sensor.study_occupancy_ml') in ['on','off'] }}"
              timeout: "00:00:20"

    # Idempotent enforcement
    - choose:
        # Occupied → ensure light ON
        - conditions:
            - condition: state
              entity_id: binary_sensor.study_occupancy_ml
              state: 'on'
            - condition: state
              entity_id: switch.sonoff_10026284f1_1   # ← your Sonoff entity
              state: 'off'
          sequence:
            - service: switch.turn_on
              target:
                entity_id: switch.sonoff_10026284f1_1

        # Not occupied → ensure light OFF
        - conditions:
            - condition: state
              entity_id: binary_sensor.study_occupancy_ml
              state: 'off'
            - condition: state
              entity_id: switch.sonoff_10026284f1_1
              state: 'on'
          sequence:
            - service: switch.turn_off
              target:
                entity_id: switch.sonoff_10026284f1_1
      default: []

# 1) Manual ON → suspend automation
- id: study_override_via_switch_on
  alias: Study override via switch (ON)
  mode: single
  trigger:
    - platform: state
      entity_id: switch.sonoff_10026284f1_1
      to: 'on'
  condition:
    # Only if a user did it (not another automation)
    - condition: template
      value_template: "{{ trigger.to_state.context and trigger.to_state.context.user_id is not none }}"
  action:
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.study_override_internal

# 2) Manual OFF → resume automation
- id: study_override_via_switch_off
  alias: Study override via switch (OFF)
  mode: single
  trigger:
    - platform: state
      entity_id: switch.sonoff_10026284f1_1
      to: 'off'
  condition:
    - condition: template
      value_template: "{{ trigger.to_state.context and trigger.to_state.context.user_id is not none }}"
  action:
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.study_override_internal
