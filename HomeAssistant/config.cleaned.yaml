# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

# configuration.yaml

mqtt:
  sensor:
    - name: "Study Temperature"
      state_topic: "home/study/air"
      device_class: temperature
      unit_of_measurement: "°C"
      value_template: "{{ value_json.temperature }}"

    - name: "Study Humidity"
      state_topic: "home/study/air"
      device_class: humidity
      unit_of_measurement: "%"
      value_template: "{{ value_json.humidity }}"

    - name: "Air Sample Time"
      state_topic: "home/study/air"
      device_class: timestamp
      value_template: "{{ value_json.timestamp }}"

    - name: "Motion Event Type"
      state_topic: "home/study/motion/event_json"
      value_template: "{{ value_json.event }}"

    - name: "Last Motion Event Time"
      state_topic: "home/study/motion/event_json"
      device_class: timestamp
      value_template: "{{ value_json.timestamp }}"

    # ✅ MOVE THIS HERE (from template:)
    - name: "Study Occupancy Probability"
      unique_id: ml_occupancy_prob
      state_topic: "home/study/occ/state"
      unit_of_measurement: "%"
      value_template: "{{ (100 * (value_json.prob | float(0))) | round(1) }}"
      suggested_display_precision: 1

  binary_sensor:
    - name: "Study Motion"
      state_topic: "home/study/motion/state"
      payload_on: "occupied"
      payload_off: "vacant"
      device_class: motion

    - name: "Study Occupancy"
      state_topic: "home/study/motion/state_json"
      device_class: occupancy
      value_template: "{{ value_json.state }}"
      payload_on: "occupied"
      payload_off: "vacant"

    - name: "ML Anomaly"
      state_topic: "home/study/ml/inference"
      value_template: "{{ 'ON' if value_json.anomaly|int(0) == 1 else 'OFF' }}"
      payload_on: "ON"
      payload_off: "OFF"
      device_class: problem

    # ✅ ML occupancy (binary)
    - name: "Study Occupancy (ML)"
      unique_id: ml_occupancy_study
      state_topic: "home/study/occ/state"
      value_template: "{{ 'ON' if (value_json.occupied | int(0)) == 1 else 'OFF' }}"
      device_class: occupancy
      payload_on: "ON"
      payload_off: "OFF"
      json_attributes_topic: "home/study/occ/state"
      json_attributes_template: >
        {{ {'prob': (value_json.prob|float(0.0)),
            'timestamp': value_json.timestamp } }}

template:
  - sensor:
      - name: "Minutes Since Motion"
        unit_of_measurement: "min"
        state: >
          {% set ts = states('sensor.last_motion_event_time') %}
          {% if ts in ['unknown','unavailable','none'] %}
            unknown
          {% else %}
            {{ ((now() - as_datetime(ts)).total_seconds() / 60) | round(1) }}
          {% endif %}
        availability: >
          {{ states('sensor.last_motion_event_time') not in ['unknown','unavailable','none'] }}
  - sensor:
      - name: "Study Automation Status"
        unique_id: study_automation_status
        icon: >
          {% if is_state('input_boolean.study_override_internal','on') %}mdi:hand-back-right
          {% else %}mdi:robot{% endif %}
        state: >
          {% if is_state('input_boolean.study_override_internal','on') %}
            Suspended (Manual)
          {% else %}
            Active
          {% endif %}

input_boolean:
  # Hidden helper used only for logic. Don't add it to the dashboard.
  study_override_internal:
    name: Study Override (internal)
    icon: mdi:hand-back-right


